<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resource Capacity Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #f8f9fb;
    --surface2: #f0f2f5;
    --border: #e2e5eb;
    --text: #111827;
    --text-muted: #6b7280;
    --text-dim: #4b5563;
    --full: #22c55e;
    --full-bg: rgba(34,197,94,0.12);
    --free: #38bdf8;
    --free-bg: rgba(56,189,248,0.12);
    --over: #f87171;
    --over-bg: rgba(248,113,113,0.12);
    --today: #f59e0b;
    --name-w: 200px;
    --cell-w: 48px;
    --row-h: 44px;
    --proj-row-h: 32px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; min-height: 100vh; }

  /* Topbar */
  .topbar { display: flex; align-items: center; gap: 16px; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 200; }
  .topbar h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); flex: 1; }
  .topbar h1 span { color: var(--full); }
  .upload-btn { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; letter-spacing: 0.04em; transition: all 0.15s; }
  .upload-btn:hover { border-color: var(--full); color: var(--text); }
  .date-controls { display: flex; align-items: center; gap: 8px; }
  .date-controls label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .date-controls input[type="date"] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; outline: none; cursor: pointer; transition: border-color 0.15s; }
  .date-controls input[type="date"]:focus { border-color: var(--full); }
  .team-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; outline: none; cursor: pointer; transition: border-color 0.15s; min-width: 130px; }
  .team-select:focus { border-color: var(--full); }
  .team-select:disabled { opacity: 0.4; cursor: default; }

  /* Legend */
  .legend { display: flex; gap: 20px; padding: 10px 24px; border-bottom: 1px solid var(--border); background: var(--bg); align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .legend-hint { margin-left: auto; font-size: 11px; color: var(--text-muted); font-style: italic; }

  /* Grid wrap */
  .grid-wrap { overflow-x: auto; padding: 16px 24px 48px; }
  .grid-wrap::-webkit-scrollbar { height: 6px; }
  .grid-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .grid-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* State box */
  .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 80px 24px; color: var(--text-muted); }
  .state-box svg { opacity: 0.4; }
  .state-box p { font-size: 13px; }
  .state-box small { font-size: 11px; opacity: 0.7; font-family: 'IBM Plex Mono', monospace; }

  /* Table */
  .tl-table { border-collapse: collapse; min-width: max-content; }

  /* Sticky name column header */
  .th-name { width: var(--name-w); min-width: var(--name-w); position: sticky; left: 0; z-index: 10; background: var(--surface); border-right: 2px solid var(--border); }
  .th-month { text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding: 6px 0; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); background: var(--surface); }
  .th-day { width: var(--cell-w); min-width: var(--cell-w); text-align: center; padding: 6px 4px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); border-bottom: 2px solid var(--border); border-right: 1px solid var(--border); background: var(--surface); }
  .th-day.today-col { color: var(--today); background: rgba(245,158,11,0.08); }
  .th-day.weekend-col { background: #f5f5f5; color: #bbb; }
  .td-cell.weekend-col { background: #fafafa; }
  .td-proj-cell.weekend-col { background: #fafafa; }
  .day-num { display: block; font-weight: 500; }
  .day-dow { display: block; font-size: 9px; opacity: 0.6; margin-top: 1px; }

  /* Person row */
  .tr-person { cursor: pointer; }
  .tr-person:hover .td-name { background: #f6fdf8; }
  .tr-person:hover .td-cell { background: #f6fdf8; }

  .td-name { position: sticky; left: 0; z-index: 5; background: var(--bg); border-right: 2px solid var(--border); border-bottom: 1px solid var(--border); height: var(--row-h); padding: 0 12px 0 8px; white-space: nowrap; }
  .td-name-inner { display: flex; align-items: center; gap: 8px; }

  .chevron { width: 16px; height: 16px; flex-shrink: 0; color: var(--text-muted); transition: transform 0.2s ease; }
  .chevron.open { transform: rotate(90deg); }

  .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--full); flex-shrink: 0; }
  .name-text { font-size: 12px; font-weight: 500; color: var(--text); }

  .td-cell { background: var(--bg); border-bottom: 1px solid var(--border); border-right: 1px solid #f0f0f0; height: var(--row-h); padding: 4px 3px; vertical-align: middle; }
  .td-cell.today-col { background: rgba(245,158,11,0.04); border-left: 1px solid rgba(245,158,11,0.3); border-right: 1px solid rgba(245,158,11,0.3); }

  .cell-inner { width: 100%; height: 100%; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; white-space: nowrap; }
  .status-full  { background: var(--full-bg); color: var(--full); border: 1px solid rgba(34,197,94,0.25); }
  .status-free  { background: var(--free-bg); color: var(--free); border: 1px solid rgba(56,189,248,0.2); }
  .status-over  { background: var(--over-bg); color: var(--over); border: 1px solid rgba(248,113,113,0.25); }
  .status-empty { background: transparent; color: #d1d5db; border: 1px solid transparent; }

  /* Project rows */
  .tr-project { display: none; }
  .tr-project.visible { display: table-row; }

  .td-proj-name { position: sticky; left: 0; z-index: 5; background: #f9fafb; border-right: 2px solid var(--border); border-bottom: 1px solid #ebebeb; height: var(--proj-row-h); padding: 0 12px 0 50px; white-space: nowrap; font-size: 11px; color: var(--text-muted); font-style: italic; }
  .td-proj-name-inner { display: flex; align-items: center; gap: 6px; }
  .proj-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--free); flex-shrink: 0; }

  .td-proj-cell { background: #f9fafb; border-bottom: 1px solid #ebebeb; border-right: 1px solid #f0f0f0; height: var(--proj-row-h); padding: 3px; vertical-align: middle; }
  .td-proj-cell.today-col { background: rgba(245,158,11,0.03); border-left: 1px solid rgba(245,158,11,0.2); border-right: 1px solid rgba(245,158,11,0.2); }

  .proj-cell-inner { width: 100%; height: 100%; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; color: transparent; }
  .proj-cell-inner.has-hours { background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2); color: var(--free); }

  input[type="file"] { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Resource <span>Capacity</span> Timeline</h1>
  <div class="date-controls">
    <label>From</label><input type="date" id="startDate">
    <label>To</label><input type="date" id="endDate">
  </div>
  <div class="date-controls">
    <label>Team</label>
    <select class="team-select" id="teamFilter" disabled>
      <option value="">All Teams</option>
    </select>
  </div>
  <button class="upload-btn" onclick="document.getElementById('csvInput').click()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Load CSV
  </button>
  <input type="file" id="csvInput" accept=".csv">
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--full)"></div>Full</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--free)"></div>Available / Partial</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--over)"></div>Over capacity</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d1d5db"></div>Not resourced</div>
  <span class="legend-hint">&#9654; Click a row to expand projects</span>
</div>

<div class="grid-wrap" id="gridWrap">
  <div class="state-box">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    <p>Load a CSV to view the timeline</p>
    <small>Expected columns: Name, Date, CapacityHours, ProjectName, AllocatedHours</small>
  </div>
</div>

<script>
const DOW    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let allData  = [];
let expanded = new Set();

function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function toYMD(d) { return d.toISOString().slice(0,10); }
function isWeekend(d) { const day = new Date(d + 'T00:00:00').getDay(); return day === 0 || day === 6; }

function getAllDays(start, end) {
  const days = []; let cur = new Date(start + 'T00:00:00'); const last = new Date(end + 'T00:00:00');
  while (cur <= last) { days.push(toYMD(cur)); cur = addDays(cur, 1); }
  return days;
}

function normaliseDate(raw) {
  if (!raw) return null;
  const s = raw.trim().replace(/^"|"$/g, "");
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m = s.match(/^(\w+)\s+(\d{1,2}),?\s+(\d{4})$/);
  if (m) {
    const months = {january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12,jan:1,feb:2,mar:3,apr:4,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
    const mo = months[m[1].toLowerCase()];
    if (mo) return m[3] + "-" + String(mo).padStart(2,"0") + "-" + String(parseInt(m[2],10)).padStart(2,"0");
  }
  const d = new Date(s);
  if (isNaN(d.getTime())) return null;
  const utc = new Date(d.getTime() + d.getTimezoneOffset() * 60000);
  return toYMD(utc);
}

function inferRange(data) {
  const dates = data.map(r => r.date).sort();
  return { start: dates[0], end: dates[dates.length - 1] };
}

function splitLine(line) {
  const cols = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  cols.push(cur.trim());
  return cols;
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = splitLine(lines[0]).map(h => h.toLowerCase().trim());
  const ni = headers.findIndex(h => h === 'name');
  const di = headers.findIndex(h => h === 'date');
  const ci = headers.findIndex(h => h.includes('capacity'));
  const ai = headers.findIndex(h => h.includes('allocated'));
  const pi  = headers.findIndex(h => h === 'projectname' || (h.includes('project') && !h.includes('id')));
  const pii = headers.findIndex(h => h === 'projectnumber');
  const ti  = headers.findIndex(h => h.includes('team'));
  if ([ni, di, ci, ai].includes(-1)) {
    alert('CSV must have: Name, Date, CapacityHours, AllocatedHours\nOptional: ProjectName\n\nFound: ' + headers.join(', '));
    return [];
  }
  return lines.slice(1).map(line => {
    if (!line.trim()) return null;
    const c = splitLine(line);
    const date = normaliseDate(c[di]);
    if (!date) return null;
    const projName = pi >= 0 ? (c[pi]||'').trim() : '';
    const projId   = pii >= 0 ? (c[pii]||'').trim() : '';
    const projLabel = projId && projName ? projId + ' – ' + projName : projName || projId;
    return { name: (c[ni]||'').trim(), date, capacity: parseFloat(c[ci])||0, allocated: parseFloat(c[ai])||0, project: projLabel, team: ti >= 0 ? (c[ti]||'').trim() : '' };
  }).filter(r => r && r.name && r.date);
}

function buildData(data) {
  const personDay = {}, projectDay = {}, personOrder = [], personSeen = new Set(), personProjects = {};
  data.forEach(r => {
    const pk = r.name + '__' + r.date;
    if (!personDay[pk]) personDay[pk] = { capacity: r.capacity, total: 0 };
    personDay[pk].total += r.allocated;
    if (!personSeen.has(r.name)) { personSeen.add(r.name); personOrder.push(r.name); personProjects[r.name] = []; }
    if (r.project) {
      if (!personProjects[r.name].includes(r.project)) personProjects[r.name].push(r.project);
      const ppk = r.name + '__' + r.project + '__' + r.date;
      projectDay[ppk] = (projectDay[ppk] || 0) + r.allocated;
    }
  });
  return { personDay, projectDay, personOrder, personProjects };
}

function cellStatus(cap, alloc) {
  if (!alloc || alloc <= 0) return { cls: 'status-empty', label: '' };
  if (alloc > cap) { const o = (alloc - cap).toFixed(1).replace(/\.0$/,''); return { cls: 'status-over', label: '+' + o + 'h' }; }
  if (alloc >= cap) return { cls: 'status-full', label: 'Full' };
  const f = (cap - alloc).toFixed(1).replace(/\.0$/,'');
  return { cls: 'status-free', label: f + 'h' };
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function populateTeamFilter() {
  const sel = document.getElementById('teamFilter');
  const teams = [...new Set(allData.map(r => r.team).filter(Boolean))].sort();
  const current = sel.value;
  sel.innerHTML = '<option value="">All Teams</option>';
  teams.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    if (t === current) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.disabled = teams.length === 0;
}

function render() {
  const wrap = document.getElementById('gridWrap');
  if (!allData.length) {
    wrap.innerHTML = '<div class="state-box"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg><p>Load a CSV to view the timeline</p><small>Expected columns: Name, Date, CapacityHours, ProjectName, AllocatedHours</small></div>';
    return;
  }

  const s0 = document.getElementById('startDate').value;
  const e0 = document.getElementById('endDate').value;
  const { start: ds, end: de } = inferRange(allData);
  const start = s0 || ds, end = e0 || de;
  const days  = getAllDays(start, end);
  const today = toYMD(new Date());
  const selectedTeam = document.getElementById('teamFilter').value;
  const filteredData = selectedTeam ? allData.filter(r => r.team === selectedTeam) : allData;
  const { personDay, projectDay, personOrder, personProjects } = buildData(filteredData);

  // Month spans
  const monthSpans = []; let cm = null, cs = 0;
  days.forEach(d => { const m = d.slice(0,7); if (m !== cm) { if (cm) monthSpans.push({label: fmtM(cm), span: cs}); cm = m; cs = 1; } else cs++; });
  if (cm) monthSpans.push({label: fmtM(cm), span: cs});
  function fmtM(ym) { const [y,m] = ym.split('-'); return MONTHS[+m-1] + ' ' + y; }

  let h = '<table class="tl-table"><thead><tr>';
  h += '<th class="th-name" rowspan="2"></th>';
  monthSpans.forEach(ms => { h += '<th class="th-month" colspan="' + ms.span + '">' + ms.label + '</th>'; });
  h += '</tr><tr>';
  days.forEach(d => {
    const dt = new Date(d + 'T00:00:00');
    const isWE = isWeekend(d); const tc = d === today ? ' today-col' : isWE ? ' weekend-col' : '';
    h += '<th class="th-day' + tc + '"><span class="day-num">' + String(dt.getDate()).padStart(2,'0') + '</span><span class="day-dow">' + DOW[dt.getDay()] + '</span></th>';
  });
  h += '</tr></thead><tbody>';

  personOrder.forEach(name => {
    const init = name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const isExp = expanded.has(name);
    const projs = personProjects[name] || [];
    const hasP  = projs.length > 0;
    const opac  = hasP ? '1' : '0.2';

    h += '<tr class="tr-person" data-name="' + escA(name) + '">';
    h += '<td class="td-name"><div class="td-name-inner">';
    h += '<svg class="chevron' + (isExp ? ' open' : '') + '" style="opacity:' + opac + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>';
    h += '<div class="avatar">' + init + '</div>';
    h += '<span class="name-text">' + esc(name) + '</span>';
    h += '</div></td>';

    days.forEach(d => {
      const tc  = d === today ? ' today-col' : '';
      const rec = personDay[name + '__' + d];
      const { cls, label } = rec ? cellStatus(rec.capacity, rec.total) : { cls: 'status-empty', label: '' };
      h += '<td class="td-cell' + tc + '"><div class="cell-inner ' + cls + '">' + label + '</div></td>';
    });
    h += '</tr>';

    projs.forEach(proj => {
      h += '<tr class="tr-project' + (isExp ? ' visible' : '') + '" data-parent="' + escA(name) + '">';
      h += '<td class="td-proj-name"><div class="td-proj-name-inner"><div class="proj-dot"></div>' + esc(proj) + '</div></td>';
      days.forEach(d => {
        const tc  = d === today ? ' today-col' : '';
        const hrs = projectDay[name + '__' + proj + '__' + d] || 0;
        const lbl = hrs > 0 ? (hrs % 1 === 0 ? hrs + 'h' : hrs.toFixed(1) + 'h') : '';
        h += '<td class="td-proj-cell' + tc + '"><div class="proj-cell-inner' + (hrs > 0 ? ' has-hours' : '') + '">' + lbl + '</div></td>';
      });
      h += '</tr>';
    });
  });

  h += '</tbody></table>';
  wrap.innerHTML = h;

  wrap.querySelectorAll('.tr-person').forEach(row => {
    row.addEventListener('click', function() {
      const name = this.dataset.name;
      const isNowOpen = !expanded.has(name);
      if (isNowOpen) expanded.add(name); else expanded.delete(name);
      this.querySelector('.chevron').classList.toggle('open', isNowOpen);
      wrap.querySelectorAll('.tr-project[data-parent="' + CSS.escape(name) + '"]').forEach(pr => {
        pr.classList.toggle('visible', isNowOpen);
      });
    });
  });
}

document.getElementById('csvInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const parsed = parseCSV(ev.target.result);
    if (!parsed.length) { alert('No data rows parsed. Check column names.'); return; }
    allData = parsed; expanded.clear();
    const r = inferRange(allData);
    document.getElementById('startDate').value = r.start;
    document.getElementById('endDate').value   = r.end;
    populateTeamFilter();
    render();
  };
  reader.onerror = function() { alert('Error reading file.'); };
  reader.readAsText(file, 'UTF-8');
  this.value = '';
});

document.getElementById('startDate').addEventListener('change', render);
document.getElementById('endDate').addEventListener('change', render);
document.getElementById('teamFilter').addEventListener('change', function() { expanded.clear(); render(); });

// Sample data
(function() {
  const people = ['Sofia Andersen','David Spark','Emma Park','Hana Sato','Lina Novak'];
  const projs  = [['Alpha','Beta'],['Gamma','Alpha','Delta'],['Beta','Epsilon'],['Delta','Gamma'],['Alpha','Zeta']];
  const rows   = [];
  const base   = new Date('2026-02-23T00:00:00');
  for (let i = 0; i < 28; i++) {
    const d = addDays(base, i);
    
    const ds = toYMD(d);
    people.forEach((name, pi) => {
      const pat = (i + pi) % 7;
      if (pat === 3) return;
      let rem = pat === 5 ? 10 : pat === 6 ? 4.5 : 8;
      projs[pi].forEach((proj, idx) => {
        if (rem <= 0) return;
        const hrs = idx === projs[pi].length - 1 ? rem : parseFloat(Math.min(rem, Math.round(rem / (projs[pi].length - idx) * 2) / 2).toFixed(1));
        rows.push({ name, date: ds, capacity: 8, project: 'Project ' + proj, allocated: hrs, team: ['Alpha Team','Beta Team','Alpha Team','Beta Team','Alpha Team'][pi] });
        rem = parseFloat((rem - hrs).toFixed(1));
      });
    });
  }
  allData = rows;
  const r = inferRange(allData);
  document.getElementById('startDate').value = r.start;
  document.getElementById('endDate').value   = r.end;
  populateTeamFilter();
  render();
})();
</script>
</body>
